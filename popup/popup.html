<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <style>
        .modern-input {
            border: none;
            border-bottom: 1px solid #7EBFB3;
            padding: 8px 0;
            width: 100%;
            transition: all 0.2s;
            font-size: 16px;
            color: #2D2D2D;
        }
        .modern-input:focus {
            outline: none;
            border-bottom-color: #FF8B7E;
        }
        .modern-input::placeholder {
            color: #B8A7C9;
        }
        .error-message {
            color: #FF8B7E;
            font-size: 12px;
            margin-top: 4px;
            min-height: 20px;
        }
    </style>
</head>
<body class="w-[400px] p-8 bg-white">
    <div class="container">
        <!-- 标题区域 -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold mb-1 text-primary">JOIN US</h1>
            <p class="text-base-content/60 text-sm">填写你的自定义口令</p>
        </div>

        <!-- 表单区域 -->
        <div class="space-y-6">
            <!-- 输入框组 -->
            <div class="space-y-4">
                <div class="form-control">
                    <input type="text" 
                           id="loginText" 
                           class="modern-input"
                           placeholder="自定义文字（比如：小羊是猪咩）">
                    <div id="loginTextError" class="error-message"></div>
                </div>
                <div class="form-control">
                    <input type="text" 
                           id="loginNumber" 
                           class="modern-input"
                           placeholder="自定义数字（比如她/他的生日？）">
                    <div id="loginNumberError" class="error-message"></div>
                </div>
            </div>

            <!-- 按钮 -->
            <button id="loginButton" class="btn w-full h-12 normal-case text-base bg-primary text-white hover:bg-primary/90">
                下一步
            </button>

            <!-- 底部链接 -->
            <div class="text-center text-sm">
                <span class="text-base-content/60">已有口令？</span>
                <a href="#" class="text-primary hover:underline">前往登录</a>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
